<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AubainePlus - Les meilleurs rabais du Québec</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <!-- ========== NAVBAR ========== -->
    <nav class="navbar">
      <div class="navbar__content">
        <!-- Logo + Titre -->
        <div class="navbar__brand">
          <img src="images/aubainelogo.png" alt="AubainePlus Logo" class="navbar__logo">
          <div class="navbar__branding">
            <h1 class="navbar__title">AubainePlus</h1>
            <p class="navbar__subtitle">Les meilleurs rabais</p>
          </div>
        </div>

        <!-- Navigation Catégories -->
        <nav id="categories-nav" class="navbar__categories"></nav>

        <!-- Mascotte (optionnel) -->
        <img src="images/aubaineplus.jpg" alt="Mascotte" class="navbar__mascotte">
      </div>
    </nav>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main">
      <div id="produits-container" class="produits-grid">
        <div class="loading">Chargement des produits...</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 AubainePlus. Tous droits réservés.</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
